<!DOCTYPE html>
<html>

<head>

<title>Road Map AI Register</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="navbar">

<h1>Road Map AI</h1>

</div>

<div style="
width:450px;
margin:60px auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
">

<h2>Create Account</h2>

<br>

<input
type="text"
placeholder="Full Name"
style="width:100%;padding:12px;">

<br><br>

<input
type="email"
placeholder="Email"
style="width:100%;padding:12px;">

<br><br>

<input
type="password"
placeholder="Password"
style="width:100%;padding:12px;">

<br><br>

<input
type="password"
placeholder="Confirm Password"
style="width:100%;padding:12px;">

<br><br>

<button
style="
width:100%;
padding:12px;
background:#1a73e8;
color:white;
border:none;
border-radius:8px;
">

Register

</button>

</div>

</body>

</html>
